name: Build Installers

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build fat JAR
        run: mvn package -q

      - name: Convert icon (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     src/main/resources/com/dosboxeditor/dosboxconfeditor.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     src/main/resources/com/dosboxeditor/dosboxconfeditor.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     src/main/resources/com/dosboxeditor/dosboxconfeditor.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     src/main/resources/com/dosboxeditor/dosboxconfeditor.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   src/main/resources/com/dosboxeditor/dosboxconfeditor.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   src/main/resources/com/dosboxeditor/dosboxconfeditor.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   src/main/resources/com/dosboxeditor/dosboxconfeditor.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   src/main/resources/com/dosboxeditor/dosboxconfeditor.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   src/main/resources/com/dosboxeditor/dosboxconfeditor.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 src/main/resources/com/dosboxeditor/dosboxconfeditor.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o dosboxconfeditor.icns

      - name: Create minimal JRE (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          jlink \
            --no-header-files \
            --no-man-pages \
            --compress=2 \
            --strip-debug \
            --add-modules java.base,java.desktop,java.logging,java.naming,\
          java.prefs,java.sql,java.xml,javafx.controls,javafx.fxml,\
          javafx.graphics,javafx.base \
            --output custom-jre

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          jpackage \
            --input target/ \
            --name "DOSBox Config Editor" \
            --main-jar dosbox-conf-editor-1.0.0.jar \
            --main-class com.dosboxeditor.App \
            --type dmg \
            --app-version 1.0.0 \
            --icon dosboxconfeditor.icns \
            --runtime-image custom-jre \
            --dest dist/

      - name: Convert icon (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          magick src/main/resources/com/dosboxeditor/dosboxconfeditor.png `
            -define icon:auto-resize=256,128,64,48,32,16 `
            dosboxconfeditor.ico

      - name: Create minimal JRE (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          jlink `
            --no-header-files `
            --no-man-pages `
            --compress=2 `
            --strip-debug `
            --add-modules java.base,java.desktop,java.logging,java.naming,java.prefs,java.sql,java.xml,javafx.controls,javafx.fxml,javafx.graphics,javafx.base `
            --output custom-jre

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          jpackage `
            --input target/ `
            --name "DOSBox Config Editor" `
            --main-jar dosbox-conf-editor-1.0.0.jar `
            --main-class com.dosboxeditor.App `
            --type exe `
            --app-version 1.0.0 `
            --icon dosboxconfeditor.ico `
            --runtime-image custom-jre `
            --dest dist/

      - name: Create minimal JRE (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          jlink \
            --no-header-files \
            --no-man-pages \
            --compress=2 \
            --strip-debug \
            --add-modules java.base,java.desktop,java.logging,java.naming,\
          java.prefs,java.sql,java.xml,javafx.controls,javafx.fxml,\
          javafx.graphics,javafx.base \
            --output custom-jre

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          jpackage \
            --input target/ \
            --name "DOSBox Config Editor" \
            --main-jar dosbox-conf-editor-1.0.0.jar \
            --main-class com.dosboxeditor.App \
            --type deb \
            --app-version 1.0.0 \
            --icon src/main/resources/com/dosboxeditor/dosboxconfeditor.png \
            --runtime-image custom-jre \
            --dest dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: dist/

  build-steamdeck:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libfuse2 wget curl

      - name: Install Liberica Full JDK 21 (includes JavaFX)
        run: |
          wget -q https://download.bell-sw.com/java/21.0.3+10/bellsoft-jdk21.0.3+10-linux-amd64-full.deb
          sudo apt-get install -y ./bellsoft-jdk21.0.3+10-linux-amd64-full.deb
          export JAVA_HOME=/usr/lib/jvm/bellsoft-java21-full-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          java -version

      - name: Download AppImage tool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build fat JAR
        run: |
          export JAVA_HOME=/usr/lib/jvm/bellsoft-java21-full-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          mvn package -q

      - name: Create minimal JRE (Steam Deck)
        run: |
          export JAVA_HOME=/usr/lib/jvm/bellsoft-java21-full-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          jlink \
            --no-header-files \
            --no-man-pages \
            --compress=2 \
            --strip-debug \
            --add-modules java.base,java.desktop,java.logging,java.naming,\
          java.prefs,java.sql,java.xml,javafx.controls,javafx.fxml,\
          javafx.graphics,javafx.base \
            --output custom-jre

      - name: Run jpackage to get app image dir
        run: |
          export JAVA_HOME=/usr/lib/jvm/bellsoft-java21-full-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          jpackage \
            --input target/ \
            --name "DOSBox Config Editor" \
            --main-jar dosbox-conf-editor-1.0.0.jar \
            --main-class com.dosboxeditor.App \
            --type app-image \
            --app-version 1.0.0 \
            --icon src/main/resources/com/dosboxeditor/dosboxconfeditor.png \
            --runtime-image custom-jre \
            --dest dist/

      - name: Verify JavaFX is bundled
        run: |
          echo "Checking bundled JDK for JavaFX..."
          find "dist/DOSBox Config Editor" -name "javafx*" | head -20
          find "dist/DOSBox Config Editor" -name "*.so" | grep -i fx | head -20

      - name: Prepare AppDir structure
        run: |
          APPDIR=AppDir
          APP="DOSBox Config Editor"
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons"
          
          # Copy entire jpackage app-image output into AppDir
          cp -r "dist/$APP/." "$APPDIR/usr/bin/$APP"
          
          # Create the .desktop file
          cat > "$APPDIR/usr/share/applications/dosbox-conf-editor.desktop" << EOF
          [Desktop Entry]
          Name=DOSBox Config Editor
          Exec=DOSBox Config Editor
          Icon=dosboxconfeditor
          Type=Application
          Categories=Utility;
          EOF
          
          # Copy icon
          cp src/main/resources/com/dosboxeditor/dosboxconfeditor.png \
             "$APPDIR/usr/share/icons/dosboxconfeditor.png"
          
          # Create AppRun entrypoint — explicitly set JAVA_HOME to bundled JDK
          cat > "$APPDIR/AppRun" << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          APP_DIR="$HERE/usr/bin/DOSBox Config Editor"
          export JAVA_HOME="$APP_DIR/runtime"
          export PATH="$JAVA_HOME/bin:$PATH"
          # Tell JavaFX where to find its native libs
          export LD_LIBRARY_PATH="$JAVA_HOME/lib:$JAVA_HOME/lib/server:$LD_LIBRARY_PATH"
          exec "$APP_DIR/bin/DOSBox Config Editor" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
          
          # Symlink desktop and icon to AppDir root
          ln -sf usr/share/applications/dosbox-conf-editor.desktop \
            "$APPDIR/dosbox-conf-editor.desktop"
          ln -sf usr/share/icons/dosboxconfeditor.png \
            "$APPDIR/dosboxconfeditor.png"

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir \
            DOSBox-Config-Editor-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-steamdeck
          path: DOSBox-Config-Editor-x86_64.AppImage

  release:
    needs: [build, build-steamdeck]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          body: "Automated build from commit ${{ github.sha }}"
          files: |
            artifacts/installer-macos-latest/*
            artifacts/installer-ubuntu-latest/*
            artifacts/installer-windows-latest/*
            artifacts/installer-steamdeck/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}