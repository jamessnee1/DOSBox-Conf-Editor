name: Build Installers

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build fat JAR
        run: mvn package -q

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          jpackage \
            --input target/ \
            --name "DOSBox Config Editor" \
            --main-jar dosbox-conf-editor-1.0.0.jar \
            --main-class com.dosboxeditor.App \
            --type dmg \
            --app-version 1.0.0 \
            --dest dist/

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          jpackage \
            --input target/ \
            --name "DOSBox Config Editor" \
            --main-jar dosbox-conf-editor-1.0.0.jar \
            --main-class com.dosboxeditor.App \
            --type deb \
            --app-version 1.0.0 \
            --dest dist/

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          jpackage `
            --input target/ `
            --name "DOSBox Config Editor" `
            --main-jar dosbox-conf-editor-1.0.0.jar `
            --main-class com.dosboxeditor.App `
            --type exe `
            --app-version 1.0.0 `
            --dest dist/

      - name: Upload installer
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/
          asset_name: installer-${{ matrix.os }}
          asset_content_type: application/octet-stream